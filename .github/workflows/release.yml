name: Release

# Canon release automation, single-workflow inline pattern.
#
# release-please cuts version/changelog/release PRs from conventional commits.
# When a release PR merges (a push to master), release-please creates the
# GitHub Release + tag, and — in the SAME run — the publish job builds and
# uploads to PyPI via Trusted Publisher (OIDC).
#
# Why inline (not a separate release-triggered publish workflow): a GitHub
# Release created with GITHUB_TOKEN is deliberately blocked from triggering
# downstream workflows (anti-recursion). Publishing in the same run sidesteps
# that entirely, so no GitHub App token is needed. PyPI's Trusted Publisher
# must be configured for THIS workflow filename (release.yml) + environment
# `pypi`.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5  # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Trusted Publisher (OIDC) — no PyPI token secret needed.
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
