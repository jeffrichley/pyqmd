name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4
      - run: uv sync
      - run: just check

      # Patch-coverage gate: ADVISORY only — continue-on-error because safe
      # autofixes in this branch touch low-coverage lines; hard gate deferred to
      # strict-debt tracking issue.
      - name: diff-cover patch-level gate (advisory)
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11'
        continue-on-error: true
        run: uv run diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=80

      # Codecov upload: Linux + py3.11 only (coverage.xml is OS-independent)
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4776c7e7b2  # v4.6.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - run: uv cache prune --ci
